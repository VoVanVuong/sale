spring.application.name=UserTool
spring.datasource.url=jdbc:postgresql://localhost:5432/user_tool
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Fail fast if Redis is unavailable so seeding never stalls registration.
spring.data.redis.timeout=300ms
spring.data.redis.connect-timeout=300ms

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true